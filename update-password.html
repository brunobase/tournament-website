<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화정중 멸망전 - 새 비밀번호 설정</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>새 비밀번호 설정</h2>
                <p>새로 사용할 비밀번호를 입력해주세요.</p>
            </div>
            <form class="auth-form" id="update-pw-form">
                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" id="new-password" class="base-input" placeholder="8자 이상 입력" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 확인</label>
                    <input type="password" id="confirm-password" class="base-input" placeholder="비밀번호 재입력" required>
                </div>
                <button type="submit" class="btn-auth btn-interactive-main">비밀번호 변경 완료</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
