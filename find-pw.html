<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화정중 멸망전 - 비밀번호 찾기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>비밀번호 찾기</h2>
                <p>가입하신 이메일을 입력하시면<br>비밀번호 재설정 링크를 발송해드립니다.</p>
            </div>
            <form class="auth-form" id="find-pw-form">
                <div class="form-group">
                    <label>이메일 주소</label>
                    <input type="email" id="reset-email" class="base-input" placeholder="가입한 이메일을 입력하세요" required>
                </div>
                <button type="submit" class="btn-auth btn-interactive-main">재설정 링크 발송</button>
            </form>
            <div class="auth-footer">
                <a href="login.html">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
