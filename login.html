<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화정중 멸망전 - 로그인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo-text">화정중 <span class="sub-logo">멸망전</span></span>
                <p>서비스 이용을 위해 로그인해주세요.</p>
            </div>
            <form class="auth-form" id="login-form">
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="login-email" class="base-input" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="login-password" class="base-input" placeholder="비밀번호를 입력하세요" required>
                </div>
                <button type="submit" class="btn-auth btn-interactive-main">로그인</button>
            </form>
            <div class="auth-footer">
                <a href="find-pw.html">비밀번호 찾기</a>
                <span class="divider">|</span>
                <a href="signup.html">회원가입</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
