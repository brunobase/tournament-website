<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화정중 멸망전 - 회원가입</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card signup-card">
            <div class="auth-header">
                <h2>회원가입</h2>
                <p>멸망전 참여를 위해 정보를 입력해주세요.</p>
            </div>
            <form class="auth-form" id="signup-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>이름</label>
                        <input type="text" id="signup-name" class="base-input" placeholder="실명 입력" required>
                    </div>
                    <div class="form-group">
                        <label>학년</label>
                        <select id="signup-grade" class="base-input">
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="signup-email" class="base-input" placeholder="계정에 사용할 이메일" required>
                </div>

                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="signup-password" class="base-input" placeholder="8자 이상 입력" required>
                </div>

                <button type="submit" class="btn-auth btn-interactive-main">가입하기</button>
            </form>

            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
